<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1e"/>
      <stop offset="100%" style="stop-color:#1a1033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative elements -->
  <circle cx="1000" cy="100" r="200" fill="#a855f7" opacity="0.08"/>
  <circle cx="200" cy="530" r="150" fill="#06b6d4" opacity="0.06"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#312e4a" stroke-width="1" opacity="0.4"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.3"/>
  
  <!-- Neural network decorative lines -->
  <g opacity="0.15">
    <line x1="850" y1="200" x2="950" y2="150" stroke="#a855f7" stroke-width="2"/>
    <line x1="850" y1="200" x2="950" y2="250" stroke="#06b6d4" stroke-width="2"/>
    <line x1="850" y1="200" x2="950" y2="350" stroke="#10b981" stroke-width="2"/>
    <circle cx="850" cy="200" r="4" fill="#a855f7"/>
    <circle cx="950" cy="150" r="4" fill="#a855f7"/>
    <circle cx="950" cy="250" r="4" fill="#06b6d4"/>
    <circle cx="950" cy="350" r="4" fill="#10b981"/>
  </g>
  
  <!-- Content -->
  <g transform="translate(80, 200)">
    <!-- Logo/Brand -->
    <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="24" fill="#a855f7" font-weight="500">jotive.dev</text>
    
    <!-- Main heading -->
    <text x="0" y="80" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#fafafa">
      Jotive
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="140" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="400" fill="#94a3b8">
      Ingeniero de Sistemas · AI Backend
    </text>
    
    <!-- Divider -->
    <line x1="0" y1="180" x2="400" y2="180" stroke="url(#accent)" stroke-width="4"/>
    
    <!-- Description -->
    <text x="0" y="230" font-family="Inter, -apple-system, sans-serif" font-size="24" fill="#64748b">
      LLM · RAG · LangChain · Vector Search · Agents
    </text>
  </g>
  
  <!-- Right side: AI code snippet decoration -->
  <g transform="translate(720, 180)" opacity="0.7">
    <rect x="0" y="0" width="380" height="280" rx="12" fill="#151025" stroke="#312e4a" stroke-width="2"/>
    
    <!-- Code dots -->
    <circle cx="20" cy="20" r="6" fill="#ef4444"/>
    <circle cx="40" cy="20" r="6" fill="#f59e0b"/>
    <circle cx="60" cy="20" r="6" fill="#10b981"/>
    
    <!-- Code lines -->
    <g transform="translate(20, 50)" font-family="JetBrains Mono, monospace" font-size="13">
      <text x="0" y="0" fill="#64748b">from langchain import OpenAI, VectorStore</text>
      <text x="0" y="25" fill="#94a3b8">from langgraph import Agent, Workflow</text>
      <text x="0" y="50" fill="#94a3b8"></text>
      <text x="0" y="75" fill="#64748b">class <tspan fill="#a855f7">AIAgent</tspan>:</text>
      <text x="0" y="100" fill="#94a3b8">    def <tspan fill="#06b6d4">process</tspan>(self, query):</text>
      <text x="0" y="125" fill="#94a3b8">        context = <tspan fill="#a855f7">vector_search</tspan>(query)</text>
      <text x="0" y="150" fill="#94a3b8">        response = <tspan fill="#06b6d4">llm.generate</tspan>(</text>
      <text x="0" y="175" fill="#f59e0b">            context=context,</text>
      <text x="0" y="200" fill="#f59e0b">            streaming=True</text>
      <text x="0" y="225" fill="#94a3b8">        )</text>
    </g>
  </g>
</svg>
